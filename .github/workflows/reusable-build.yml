# ═════════════════════════════════════════════════════════════════════════════
# WORKFLOW REUTILIZABLE
# Construye una imagen Docker y la sube a GitHub Container Registry (ghcr.io)
# ═════════════════════════════════════════════════════════════════════════════
name: Reusable Build

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: 'Nombre del servicio a construir (api-net o api-nestjs)'
      context_path:
        required: true
        type: string
        description: 'Ruta del Dockerfile (ej: ./gravityflip.api)'
    secrets:
      DB_PASSWORD:
        required: true
        description: 'Contraseña de la base de datos'

jobs:
  build:
    runs-on: ubuntu-latest

    # Permisos necesarios para publicar la imagen en ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      - name: Bajar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ───────────────────────────────────────────────────────────────────────
      # Login al GitHub Container Registry (ghcr.io)
      # Usa el token automatico de GitHub para autenticarse
      # ───────────────────────────────────────────────────────────────────────
      - name: Iniciar sesion en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ───────────────────────────────────────────────────────────────────────
      # Construir y publicar la imagen Docker
      # La imagen queda guardada en GitHub: ghcr.io/Ghost-GAM/<service>:latest
      # ───────────────────────────────────────────────────────────────────────
      - name: Construir y publicar imagen Docker de ${{ inputs.service_name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.context_path }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:${{ github.sha }}
          build-args: |
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

      - name: Mostrar URL de la imagen publicada
        run: |
          echo "===================================="
          echo "Imagen publicada exitosamente:"
          echo "ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:latest"
          echo "===================================="